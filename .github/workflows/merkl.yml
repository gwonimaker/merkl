name: Merkl Telegram Alerts

on:
  schedule:
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch:
    inputs:
      send_initial:
        description: Send currently listed opportunities too
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: merkl-telegram-alerts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Merkl opportunities
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MERKL_SEND_INITIAL: ${{ github.event.inputs.send_initial || 'false' }}
        run: python merkl_monitor.py

      - name: Commit seen opportunities
        run: |
          if [ ! -f merkl_seen_opportunities.json ]; then
            echo "No state file to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add merkl_seen_opportunities.json
          git diff --cached --quiet || git commit -m "Update seen Merkl opportunities"
          git push
