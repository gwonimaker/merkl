name: Price Alert

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  send-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Send Telegram price alert
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FX_SYMBOL: "KRW=X"
          WTI_SYMBOL: "CL=F"
          US10Y_SYMBOL: "^TNX"
        run: node scripts/price-alert.mjs
