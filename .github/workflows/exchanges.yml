name: Exchange Earn Event Alerts

on:
  schedule:
    - cron: "11,26,41,56 * * * *"
  workflow_dispatch:
    inputs:
      send_initial:
        description: Send currently detected events too
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: exchange-earn-event-alerts
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check exchange earn events
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EXCHANGE_SEND_INITIAL: ${{ github.event.inputs.send_initial || 'false' }}
        run: python exchange_monitor.py

      - name: Commit seen exchange events
        run: |
          if [ ! -f exchange_seen_events.json ]; then
            echo "No exchange state file to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add exchange_seen_events.json
          git diff --cached --quiet || git commit -m "Update seen exchange earn events"
          git push
